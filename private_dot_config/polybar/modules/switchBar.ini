[module/switchBar]
type = custom/script
interval=1
format = <label>
format-background = ${colors.black}
format-foreground = ${colors.white}
exec = ~/.config/polybar/launch/scroll-switch.sh query
label = "      %output%      "
scroll-up = ~/.config/polybar/launch/scroll-switch.sh prev
scroll-down = ~/.config/polybar/launch/scroll-switch.sh next
click-left = ~/.config/polybar/launch/scroll-switch.sh refresh