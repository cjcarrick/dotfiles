[module/switchTheme]
format-background=${colors.primary}
type = custom/script
format = <label>
exec = ~/.config/polybar/scripts/themes/switchTheme.sh query
interval = 600
label =  %output%

click-left =  ~/.config/polybar/scripts/themes/switchTheme.sh menu
scroll-up = ~/.config/polybar/scripts/themes/switchTheme.sh prev
scroll-down = ~/.config/polybar/scripts/themes/switchTheme.sh next
