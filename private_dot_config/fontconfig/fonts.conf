<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
	<alias>

		<family>sans-serif</family>
		<prefer>
			<family>San Francisco Text</family>
			<family>codicon</family>
		</prefer>
	</alias>
	<alias>
		<family>serif</family>
		<prefer>
			<family>New York Small</family>
			<family>codicon</family>
		</prefer>
	</alias>
	<alias>
		<family>monospace</family>
		<prefer>
			<family>Fantasque Sans Mono</family>
			<family>codicon</family>
		</prefer>
	</alias>
	<match target='font'>
		<test name='fontformat' compare='not_eq'>
			<string />
		</test>
		<test name='family'>
			<string>Fantasque Sans Mono</string>
		</test>
		<edit name='fontfeatures' mode='assign_replace'>
			<string>ss01</string>
		</edit>
	</match>
	<dir>~/.fonts</dir>
</fontconfig>
